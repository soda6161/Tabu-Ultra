<div id="app">
    <div id="screen-login" class="screen active">
        <input id="login-name-input" type="text" placeholder="KAHRAMANIN ADI?" maxlength="12" style="top: 55%; left: 10%; width: 80%;">
        
        <div id="btn-create-room" class="big-btn" onclick="NET.createRoom()" 
             style="top: 65%; left: 15%; width: 70%; height: 8%; background: linear-gradient(45deg, #6a11cb, #2575fc);">
             YENİ ODA KUR 🚀
        </div>

        <div style="position:absolute; top:78%; width:100%; text-align:center; color:rgba(255,255,255,0.6); font-weight:bold;">Veya Arkadaşına Katıl</div>
        
        <input id="join-code-input" type="text" placeholder="ODA KODU" maxlength="5" 
               style="top: 83%; left: 15%; width: 40%; height: 7%; text-transform: uppercase;">
        
        <div id="btn-manual-join" class="big-btn" onclick="NET.manualJoin()" 
             style="top: 83%; left: 60%; width: 25%; height: 7%; background: #27ae60; font-size: 0.8rem;">
             KATIL
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div id="room-info" onclick="NET.copyRoomCode()">
            ODA: <span id="room-code-display" style="color:white">-----</span> 📋
        </div>

        <div class="team-red-box hitbox" onclick="NET.joinRole('red', 'anlatici')" style="top:25%; left:8%; width:40%; height:45%;"></div>
        <div class="team-blue-box hitbox" onclick="NET.joinRole('blue', 'anlatici')" style="top:25%; left:52%; width:40%; height:45%;"></div>

        <div id="btn-start-game" class="big-btn" onclick="ENGINE.startGame()" 
             style="bottom: 8%; left: 30%; width: 40%; height: 8%; background: #e67e22; border: 2px solid white; box-shadow: 0 0 20px rgba(230, 126, 34, 0.5);">
             SAVAŞI BAŞLAT!
        </div>
    </div>
    
    <div id="screen-game" class="screen">
        </div>
</div>
