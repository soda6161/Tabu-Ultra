<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabu Ultra</title>
    <link rel="stylesheet" href="style-game.css">
</head>
<body>
    <div id="app">

        <!-- ====================== LOGIN EKRANI ====================== -->
        <div id="screen-login" class="screen active">
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; width:100%;">
                <h1 style="font-size:3.5rem; margin-bottom:40px; text-shadow:0 0 30px #00ffff;">TABU ULTRA</h1>
                <input id="login-name-input" type="text" placeholder="İSMİNİ GİR" maxlength="12">
                <div class="login-actions">
                    <div onclick="handleLogin()" class="big-btn primary">OYUNA BAŞLA 🚀</div>
                </div>
            </div>
        </div>

        <!-- ====================== LOBBY EKRANI ====================== -->
        <div id="screen-lobby" class="screen">
            <div id="room-info" onclick="NET.copyRoomCode()">
                ODA KODU: <span id="room-code-display">-----</span>
            </div>

            <div class="teams-container">
                <!-- KIRMIZI TAKIM -->
                <div class="team-panel red">
                    <div class="team-header">🔴 KIRMIZI TAKIM</div>
                    
                    <div class="role-section">
                        <div class="role-label">ANLATICI <span class="max-count">(1/1)</span></div>
                        <button onclick="if(ENGINE.canJoinRole('red','anlatici')) NET.joinRole('red','anlatici'); else alert('Bu rol dolu!');" 
                                class="join-btn narrator-btn">🌟 ANLATICIYA KATIL</button>
                        <div id="slot-red-narrator" class="players-list"></div>
                    </div>

                    <div class="role-section">
                        <div class="role-label">DİNLEYİCİ <span class="max-count">(1/1)</span></div>
                        <button onclick="if(ENGINE.canJoinRole('red','dinleyici')) NET.joinRole('red','dinleyici'); else alert('Bu rol dolu!');" 
                                class="join-btn listener-btn">👂 DİNLEYİCİYE KATIL</button>
                        <div id="slot-red-guesser" class="players-list"></div>
                    </div>
                </div>

                <!-- MAVİ TAKIM -->
                <div class="team-panel blue">
                    <div class="team-header">🔵 MAVİ TAKIM</div>
                    
                    <div class="role-section">
                        <div class="role-label">ANLATICI <span class="max-count">(1/1)</span></div>
                        <button onclick="if(ENGINE.canJoinRole('blue','anlatici')) NET.joinRole('blue','anlatici'); else alert('Bu rol dolu!');" 
                                class="join-btn narrator-btn">🌟 ANLATICIYA KATIL</button>
                        <div id="slot-blue-narrator" class="players-list"></div>
                    </div>

                    <div class="role-section">
                        <div class="role-label">DİNLEYİCİ <span class="max-count">(1/1)</span></div>
                        <button onclick="if(ENGINE.canJoinRole('blue','dinleyici')) NET.joinRole('blue','dinleyici'); else alert('Bu rol dolu!');" 
                                class="join-btn listener-btn">👂 DİNLEYİCİYE KATIL</button>
                        <div id="slot-blue-guesser" class="players-list"></div>
                    </div>
                </div>
            </div>

            <button id="btn-start-game" onclick="ENGINE.startGame()">🚀 OYUNU BAŞLAT</button>
        </div>

        <!-- ====================== OYUN EKRANI (ÇİZİMİNE TAM UYUMLU) ====================== -->
        <div id="screen-game" class="screen">

            <!-- ÜST BAR -->
            <div id="game-stats">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span id="timer-display" style="font-size:2.4rem; font-weight:900; background:rgba(0,0,0,0.45); padding:8px 22px; border-radius:50px; color:white;">00:60</span>
                </div>
                <div id="score-display" style="font-size:2rem; font-weight:900; background:rgba(0,0,0,0.45); padding:10px 26px; border-radius:9999px; color:white;">K: 0 | M: 0</div>
            </div>

            <!-- ANA KELİME KARTI -->
            <div id="word-card"></div>

            <!-- FLASH EFEKTİ -->
            <div id="flash-overlay"></div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="network-core.js"></script>
    <script src="game-engine.js"></script>
    <script>
        // Basit login fonksiyonu (Firebase bağlantısını buraya ekleyebilirsin)
        function handleLogin() {
            const name = document.getElementById('login-name-input').value.trim();
            if (!name) return alert("Lütfen ismini gir!");
            
            NET.playerName = name;
            NET.myId = "player-" + Date.now();
            // Örnek oda kodu (gerçekte oda oluşturma / katılma ekranı eklenebilir)
            NET.joinRoom("TEST123");
        }

        // Sayfa yüklendiğinde
        window.onload = () => {
            // Firebase config'in varsa buraya ekle
            // NET.init(firebase);
        };
    </script>
</body>
</html>
