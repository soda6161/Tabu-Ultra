<div id="screen-lobby" class="screen">
    <h1 id="lobby-title">ODA KODU: <span id="room-code-display"></span></h1>
    <div class="lobby-grid">
        <div class="team-card red">
            <button class="join-btn" onclick="NET.joinRole('red', 'anlatici')">ANLATICI SEÇ (1/1)</button>
            <div id="slot-red-narrator" class="name-box"></div>
            <button class="join-btn" onclick="NET.joinRole('red', 'dinleyici')">DİNLEYİCİ SEÇ (0/6)</button>
            <div id="slot-red-guesser" class="name-box"></div>
        </div>
        <div class="team-card blue">
            <button class="join-btn" onclick="NET.joinRole('blue', 'anlatici')">ANLATICI SEÇ (1/1)</button>
            <div id="slot-blue-narrator" class="name-box"></div>
            <button class="join-btn" onclick="NET.joinRole('blue', 'dinleyici')">DİNLEYİCİ SEÇ (0/6)</button>
            <div id="slot-blue-guesser" class="name-box"></div>
        </div>
    </div>
    <button class="start-btn" onclick="ENGINE.startGame()">OYUNU BAŞLAT</button>
</div>
